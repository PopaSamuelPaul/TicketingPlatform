version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: ticketing-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ticketing_db
    ports:
      - "5432:5432"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ticketing-rabbitmq
    ports:
      - "5672:5672"   # Portul pentru comunicarea cu aplicația Spring Boot
      - "15672:15672" # Portul pentru interfața web (Dashboard)
    restart: unless-stopped